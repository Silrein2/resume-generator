# Firebase App Hosting configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# App Hosting auto-detects Nuxt 3, so build/run commands aren't required here.
# This file mainly exists to declare environment variables for the deployed
# server. Public Firebase config values are technically safe to commit (they
# end up in the browser anyway), but if you'd rather not, move them to
# Secret Manager and reference them with `secret:` instead of `value:`.

runConfig:
  # Min/max number of running instances. Free-ish defaults below.
  minInstances: 0
  maxInstances: 1
  # Concurrency per instance. Nuxt's Nitro server handles many concurrent reqs.
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Firebase web app config — these are public (visible to the browser),
  # so committing them is fine. Replace the placeholder values.
  - variable: NUXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyBjyCaLdHh-AGjv5bumQB59dTXQSxbgqNM"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "resume-generator-7a7f3.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "resume-generator-7a7f3"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "resume-generator-7a7f3.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1059787428211"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_APP_ID
    value: "1:1059787428211:web:e2ef1849076dc2836f7506"
    availability:
      - BUILD
      - RUNTIME

  # Public URL of the deployed site — used to build absolute URLs for
  # OG meta tags on the observer pages. Set this to whatever App Hosting
  # assigns you (something like https://your-backend--your-project.web.app),
  # or to your custom domain once you've attached one.
  - variable: NUXT_PUBLIC_SITE_URL
    value: "https://resume-generator-staging.web.app/"
    availability:
      - BUILD
      - RUNTIME

# Example: storing the API key in Secret Manager instead of plaintext.
# Run `firebase apphosting:secrets:set FIREBASE_API_KEY` first to create it,
# then reference it like this:
#
#   - variable: NUXT_PUBLIC_FIREBASE_API_KEY
#     secret: FIREBASE_API_KEY
#     availability:
#       - BUILD
#       - RUNTIME